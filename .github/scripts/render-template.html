<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>GLB renderer</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1d24; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.184.0",
    "three/addons/": "https://esm.sh/three@0.184.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import * as THREE from "three";
  import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
  import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

  // GLB-файлы экспортируются из Blender с Draco compression (см. docs/blender-guide.md).
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.7/");

  const RESIN_COLOR = new THREE.Color("#8a8580");

  function sanitize(mat) {
    mat.transparent = false;
    mat.opacity = 1;
    mat.depthWrite = true;
    mat.alphaTest = 0;
    mat.side = THREE.FrontSide;
    if ("transmission" in mat) mat.transmission = 0;
    if ("thickness" in mat) mat.thickness = 0;
    if (!mat.map && mat.color) mat.color.copy(RESIN_COLOR);
    mat.roughness = 0.85;
    mat.metalness = 0;
    mat.envMapIntensity = 0.25;
    mat.needsUpdate = true;
  }

  // Ищем mesh/node с именем "base" и возвращаем ЛОКАЛЬНЫЙ geometry bbox × scale.
  // Почему не world bbox: у Blender-экспорта node может иметь rotation 180°
  // (квот ≈ (-0.99, 0, 0.14, 0) у 10236 fig2), и three.js setFromObject
  // применяет всю матрицу → AABB повёрнутой плоской базы получается меньше
  // реального диаметра (10236 fig2: real 60, world bbox дал 37).
  // Геометрия в local coords — это чистый дизайн меша, rotation на размер не влияет.
  // Отдельно fetch GLB и парсим JSON chunk из header (минуя GLTFLoader).
  // gltf.parser.json в esm.sh сборке three.js недоступен, поэтому читаем сами.
  async function fetchGlbJson(glbUrl) {
    try {
      const resp = await fetch(glbUrl);
      if (!resp.ok) return null;
      const buf = await resp.arrayBuffer();
      const dv = new DataView(buf);
      const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
      if (magic !== "glTF") return null;
      const chunkLen = dv.getUint32(12, true);
      const jsonStr = new TextDecoder().decode(new Uint8Array(buf, 20, chunkLen));
      return JSON.parse(jsonStr);
    } catch (e) {
      console.warn("fetchGlbJson failed:", e.message);
      return null;
    }
  }

  // Читает raw accessor.POSITION.min/max из GLB JSON metadata, обходя three.js
  // и Draco decoder. Размер базы = (max - min) × abs(node.scale) — без rotation,
  // т.к. rotation для квадратной базы искажает world AABB (10236 fig2 node
  // 60_base имеет quaternion 180° → world AABB квадрата 60×60 → 74×74 или 37×37).
  function findBaseFromGltfJson(gltfJson) {
    const patterns = [/\bbase\b/i, /подставк/i, /основани/i];
    const nodes = gltfJson?.nodes ?? [];
    const meshes = gltfJson?.meshes ?? [];
    const accessors = gltfJson?.accessors ?? [];
    const candidates = [];
    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const name = node.name || "";
      if (!patterns.some((p) => p.test(name))) continue;
      const meshIdx = node.mesh;
      if (meshIdx === undefined) continue;
      const mesh = meshes[meshIdx];
      const prim = mesh?.primitives?.[0];
      if (!prim) continue;
      const accIdx = prim.attributes?.POSITION;
      if (accIdx === undefined) continue;
      const acc = accessors[accIdx];
      if (!acc?.min || !acc?.max) continue;
      const mn = acc.min;
      const mx = acc.max;
      const sx = Math.abs(node.scale?.[0] ?? 1);
      const sy = Math.abs(node.scale?.[1] ?? 1);
      const sz = Math.abs(node.scale?.[2] ?? 1);
      const rangeX = (mx[0] - mn[0]) * sx;
      const rangeY = (mx[1] - mn[1]) * sy;
      const rangeZ = (mx[2] - mn[2]) * sz;
      const tY = node.translation?.[1] ?? 0;
      candidates.push({
        name,
        rangeX,
        rangeY,
        rangeZ,
        tY,
        nodeIdx: i,
        meshIdx,
        mesh_name: mesh?.name ?? null,
      });
    }
    if (!candidates.length) return null;
    candidates.sort((a, b) => a.tY - b.tY);
    const winner = candidates[0];
    const nameMatch = winner.name.match(/(\d+)[_\s-]*base|base[_\s-]*(\d+)/i);
    const nameDimMm = nameMatch ? parseInt(nameMatch[1] ?? nameMatch[2], 10) : null;
    return {
      ...winner,
      sizeY: winner.rangeY,
      name_hint_dim_mm: nameDimMm,
      all_candidates: candidates.map((c) => ({
        name: c.name,
        t_y: c.tY,
        range_x: c.rangeX,
        range_z: c.rangeZ,
      })),
    };
  }

  function findBaseByName(root) {
    const patterns = [/\bbase\b/i, /подставк/i, /основани/i];
    const candidates = [];
    root.traverse((obj) => {
      const n = obj.name ?? "";
      if (!n) return;
      if (!patterns.some((p) => p.test(n))) return;
      // DIAGNOSTIC dump
      console.warn(`[base-candidate] name=${n} type=${obj.type} isMesh=${!!obj.isMesh} scale=${JSON.stringify(obj.scale?.toArray?.() ?? null)} pos=${JSON.stringify(obj.position?.toArray?.() ?? null)} quat=${JSON.stringify(obj.quaternion?.toArray?.() ?? null)}`);
      // Собираем union геометрии всех Mesh-детей этого узла.
      let localBox = null;
      obj.traverse((m) => {
        if (!m.isMesh || !m.geometry) return;
        m.geometry.computeBoundingBox();
        const b = m.geometry.boundingBox;
        if (!b || !isFinite(b.min.y)) return;
        console.warn(`  [mesh-child] name=${m.name} scale=${JSON.stringify(m.scale?.toArray?.() ?? null)} bbox min=${JSON.stringify(b.min.toArray())} max=${JSON.stringify(b.max.toArray())} size=${JSON.stringify(b.getSize(new THREE.Vector3()).toArray())}`);
        if (!localBox) localBox = b.clone();
        else localBox.union(b);
      });
      if (!localBox) return;
      const lsz = localBox.getSize(new THREE.Vector3());
      // Abs scale убирает отрицательные (mirror) значения.
      const sx = Math.abs(obj.scale?.x ?? 1);
      const sy = Math.abs(obj.scale?.y ?? 1);
      const sz = Math.abs(obj.scale?.z ?? 1);
      const rangeX = lsz.x * sx;
      const rangeZ = lsz.z * sz;
      const sizeY = lsz.y * sy;
      if (rangeX <= 0 && rangeZ <= 0) return;
      // Для сортировки кандидатов используем translation.y (ниже = ближе к дну).
      const tY = obj.position?.y ?? 0;
      candidates.push({ obj, rangeX, rangeZ, sizeY, tY });
    });
    if (!candidates.length) return null;
    candidates.sort((a, b) => a.tY - b.tY);
    const winner = candidates[0];
    const nameMatch = winner.obj.name.match(/(\d+)[_\s-]*base|base[_\s-]*(\d+)/i);
    const nameDimMm = nameMatch ? parseInt(nameMatch[1] ?? nameMatch[2], 10) : null;
    return {
      name: winner.obj.name,
      rangeX: winner.rangeX,
      rangeZ: winner.rangeZ,
      sizeY: winner.sizeY,
      tY: winner.tY,
      name_hint_dim_mm: nameDimMm,
      all_candidates: candidates.map((c) => ({
        name: c.obj.name,
        t_y_mm: c.tY * 1000,
        range_x_mm: c.rangeX * 1000,
        range_z_mm: c.rangeZ * 1000,
      })),
    };
  }

  // Fallback: собираем X/Z вершин в нижнем slice, считаем percentile-range
  // вместо min/max — устойчиво к outliers (рукоять оружия лежащая на полу,
  // вылезающая за край базы). p=0.05 отсечёт по 5% с каждой стороны.
  function measureBaseFootprint(root, thresholdY, pct = 0.05) {
    const xs = [];
    const zs = [];
    const v = new THREE.Vector3();
    root.updateMatrixWorld(true);
    root.traverse((obj) => {
      if (!obj.isMesh || !obj.geometry?.attributes?.position) return;
      const pos = obj.geometry.attributes.position;
      const mat = obj.matrixWorld;
      for (let i = 0; i < pos.count; i++) {
        v.fromBufferAttribute(pos, i).applyMatrix4(mat);
        if (v.y <= thresholdY) {
          xs.push(v.x);
          zs.push(v.z);
        }
      }
    });
    if (xs.length === 0) return { rangeX: 0, rangeZ: 0, rangeX_full: 0, rangeZ_full: 0, hits: 0 };
    xs.sort((a, b) => a - b);
    zs.sort((a, b) => a - b);
    const loIdx = Math.floor(xs.length * pct);
    const hiIdx = Math.floor(xs.length * (1 - pct)) - 1;
    const loX = xs[loIdx], hiX = xs[hiIdx];
    const loZ = zs[loIdx], hiZ = zs[hiIdx];
    return {
      rangeX: hiX - loX,
      rangeZ: hiZ - loZ,
      rangeX_full: xs[xs.length - 1] - xs[0],
      rangeZ_full: zs[zs.length - 1] - zs[0],
      hits: xs.length,
    };
  }

  window.renderGLB = async function renderGLB(glbUrl, angles, size = 1024, glbUnit = "m", assembledAt = "end") {
    const canvas = document.createElement("canvas");
    canvas.width = size;
    canvas.height = size;
    document.body.appendChild(canvas);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      preserveDrawingBuffer: true,
      alpha: false,
    });
    renderer.setPixelRatio(1);
    renderer.setSize(size, size, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1d24");

    scene.add(new THREE.AmbientLight(0xffffff, 0.12));
    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(3, 5, 5);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xf5f0e8, 0.5);
    fill.position.set(-5, 2, 3);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffe5c8, 0.7);
    rim.position.set(-4, 4, -5);
    scene.add(rim);

    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);
    const gltf = await new Promise((resolve, reject) => {
      loader.load(glbUrl, resolve, undefined, reject);
    });
    const model = gltf.scene;

    // === ИЗМЕРЕНИЯ В RAW UNITS (до применения scale и центрирования) ===
    // Важно: assembledAt определяет в каком кадре фигура СОБРАНА.
    //   'start' → frame 0 = assembled, последний кадр = разобрано (explode)
    //   'end'   → frame 0 = разобрано, последний кадр = assembled
    // Замеры (и рендер) делаем ИМЕННО в assembled-позе, иначе bbox захватывает
    // разлетевшиеся детали и высоту завышает (у m9: 52 вместо 38 мм).
    let mixer = null;
    const actions = [];
    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      for (const clip of gltf.animations) {
        const a = mixer.clipAction(clip);
        a.setLoop(THREE.LoopRepeat, Infinity);
        a.enabled = true;
        a.play();
        actions.push(a);
      }
      for (const a of actions) {
        const d = a.getClip().duration;
        a.time = assembledAt === "start" ? 0 : Math.max(0, d - 0.001);
        a.enabled = true;
        a.paused = false;
      }
      mixer.update(0);
    }
    model.updateMatrixWorld(true);

    const rawBox = new THREE.Box3().setFromObject(model);
    const rawSize = rawBox.getSize(new THREE.Vector3());

    const unitToMm = glbUnit === "m" ? 1000 : glbUnit === "cm" ? 10 : 1;
    const heightWithBaseMm = rawSize.y * unitToMm;

    // Приоритет: raw accessor из GLB JSON (через отдельный fetch GLB binary)
    // → three.js findBaseByName → slice. Первый вариант устойчив к Draco и rotation.
    const gltfJson = await fetchGlbJson(glbUrl);
    let namedBase = gltfJson ? findBaseFromGltfJson(gltfJson) : null;
    if (!namedBase) namedBase = findBaseByName(model);
    let baseMm, baseMethod, baseMeta, baseThicknessRaw;
    if (namedBase && Math.max(namedBase.rangeX, namedBase.rangeZ) > 0) {
      baseMm = Math.max(namedBase.rangeX, namedBase.rangeZ) * unitToMm;
      baseMethod = "named_mesh";
      baseMeta = namedBase;
      baseThicknessRaw = namedBase.sizeY;
    } else {
      // Slice только нижние 2 мм — это физическая толщина резиновой плиты базы.
      // 10% slice захватывает декорации/оружие/обломки на верхней поверхности
      // базы (fig2 10236 — булава торчит за край → ложные 74 мм вместо 60 мм).
      // Ограничение снизу: минимум 5% bbox для очень низких фигур.
      const baseSliceMm = 2;
      const baseSliceRaw = Math.max(baseSliceMm / unitToMm, rawSize.y * 0.05);
      const thresholdY = rawBox.min.y + baseSliceRaw;
      const slice = measureBaseFootprint(model, thresholdY, 0.05);
      baseMm = Math.max(slice.rangeX, slice.rangeZ) * unitToMm;
      baseMethod = "slice_bottom_2mm_p5p95";
      baseMeta = {
        threshold_y: thresholdY,
        slice_height_mm: baseSliceRaw * unitToMm,
        range_x_p5p95_mm: slice.rangeX * unitToMm,
        range_z_p5p95_mm: slice.rangeZ * unitToMm,
        range_x_full_mm: slice.rangeX_full * unitToMm,
        range_z_full_mm: slice.rangeZ_full * unitToMm,
        vertices_hit: slice.hits,
      };
      baseThicknessRaw = baseSliceRaw;
    }

    const heightMm = heightWithBaseMm - baseThicknessRaw * unitToMm;

    const measurements = {
      height_with_base_mm: Math.round(heightWithBaseMm),
      height_mm: Math.round(heightMm),
      base_mm: Math.round(baseMm),
      base_standard_mm: snapToStandard(baseMm),
      base_method: baseMethod,
      raw_bbox: {
        min: { x: rawBox.min.x, y: rawBox.min.y, z: rawBox.min.z },
        max: { x: rawBox.max.x, y: rawBox.max.y, z: rawBox.max.z },
        size: { x: rawSize.x, y: rawSize.y, z: rawSize.z },
      },
      base_meta: baseMeta,
      glb_unit_used: glbUnit,
    };

    // === ПОДГОТОВКА К РЕНДЕРУ ===
    const maxDim = Math.max(rawSize.x, rawSize.y, rawSize.z) || 1;
    const scale = 2.0 / maxDim;
    model.scale.setScalar(scale);
    model.updateMatrixWorld(true);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x, -box.min.y, -center.z);
    model.updateMatrixWorld(true);

    model.traverse((obj) => {
      if (obj.isMesh && obj.material) sanitize(obj.material);
    });

    scene.add(model);

    const finalBox = new THREE.Box3().setFromObject(model);
    const targetY = (finalBox.max.y - finalBox.min.y) * 0.5;

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    const results = [];

    for (const a of angles) {
      camera.position.set(a.position[0], a.position[1], a.position[2]);
      camera.lookAt(0, targetY, 0);
      renderer.render(scene, camera);
      const dataUrl = canvas.toDataURL("image/png");
      results.push({
        angle: a.name,
        base64: dataUrl.replace(/^data:image\/png;base64,/, ""),
      });
    }

    renderer.dispose();
    scene.traverse((o) => {
      if (o.geometry) o.geometry.dispose();
      const m = o.material;
      if (Array.isArray(m)) m.forEach((x) => x.dispose());
      else if (m) m.dispose();
    });

    return { images: results, measurements };
  };

  // Снап к стандартам D&D/Pathfinder/Warhammer баз. Tolerance ±1.1 мм.
  // Возвращает стандартное значение или null если замер не попал ни в один.
  const BASE_STANDARDS = [20, 25, 32, 40, 50, 65, 80, 100];
  function snapToStandard(mm, tolerance = 1.1) {
    for (const s of BASE_STANDARDS) {
      if (Math.abs(mm - s) <= tolerance) return s;
    }
    return null;
  }

  window.__READY__ = true;
</script>
</body>
</html>
